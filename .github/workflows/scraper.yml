name: Actualizar precios arriendo Chile

on:
  schedule:
    # Corre todos los días a las 7:00 AM hora Chile (UTC-3 = 10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    # También permite correrlo manualmente desde GitHub con un clic

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: |
          pip install requests beautifulsoup4 playwright lxml
          playwright install chromium
          playwright install-deps chromium

      - name: Correr scraper
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Guardar precios.json en el repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add precios.json
          git diff --staged --quiet || git commit -m "chore: actualizar precios $(date +'%Y-%m-%d')"
          git push
